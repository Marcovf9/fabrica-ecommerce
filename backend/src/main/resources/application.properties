# Conexión al contenedor Docker MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/fabrica_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=admin_fabrica
spring.datasource.password=password_seguro
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate
# 'update' altera el esquema automáticamente basándose en tus entidades. 
# ESTO ES SOLO PARA DESARROLLO. En producción usaremos migraciones con Flyway o Liquibase.
spring.jpa.hibernate.ddl-auto=create

# Logs estrictos para auditar las queries SQL que genera Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Exponer el puerto del servidor
server.port=8080

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu_correo@gmail.com
spring.mail.password=tu_contraseña_de_aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true